<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmações - B&T Tech</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== CONTAINER PRINCIPAL ========== */
        .confirmacoes-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* ========== SKELETON LOADING ========== */
        .skeleton-section {
            margin-bottom: 32px;
        }
        
        .skeleton-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 16px;
        }
        
        .skeleton-header {
            padding: 16px;
            background: var(--bg-dark);
        }
        
        .skeleton-body {
            padding: 16px;
        }
        
        .skeleton-aluno {
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* ========== SECTION HEADER ========== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 20px;
        }
        
        .section-title.today { 
            color: #10b981; 
        }
        
        .section-title.today i {
            color: #10b981;
        }
        
        .section-title.tomorrow { 
            color: #f59e0b; 
        }
        
        .section-title.tomorrow i {
            color: #f59e0b;
        }
        
        .section-title.upcoming { 
            color: #3b82f6; 
        }
        
        .section-title.upcoming i {
            color: #3b82f6;
        }
        
        .date-badge {
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        
        /* ========== AULA CARD ========== */
        .aula-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        
        .aula-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .aula-header.amanha {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .aula-header.proximo {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .aula-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .aula-info p {
            font-size: 13px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .aula-info p i {
            width: 16px;
        }
        
        .pendente-badge {
            background: rgba(255,255,255,0.25);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 4px;
        }
        
        /* ========== BOTÃO WHATSAPP TURMA ========== */
        .whatsapp-turma-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.6);
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            transition: all 0.2s;
            min-height: var(--touch-target-min, 44px);
        }
        
        .whatsapp-turma-btn:hover {
            background: rgba(255,255,255,0.35);
            border-color: white;
            transform: translateY(-2px);
        }
        
        .whatsapp-turma-btn:active {
            transform: translateY(0);
        }
        
        /* ========== LISTA DE ALUNOS ========== */
        .alunos-list {
            padding: 16px;
        }
        
        .aluno-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: var(--bg-dark);
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .aluno-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 200px;
        }
        
        .aluno-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .aluno-nome {
            font-weight: 500;
            font-size: 14px;
        }
        
        .aluno-telefone {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .aluno-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* ========== STATUS BADGE ========== */
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .status-badge.pendente { 
            background: var(--warning-bg); 
            color: #d97706; 
        }
        
        .status-badge.confirmado { 
            background: var(--success-bg); 
            color: #059669; 
        }
        
        .status-badge.cancelado { 
            background: var(--danger-bg); 
            color: #dc2626; 
        }
        
        /* ========== BOTÃO WHATSAPP ========== */
        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            transition: all 0.2s;
            min-height: var(--touch-target-min, 44px);
        }
        
        .whatsapp-btn:hover {
            background: #20BD5A;
            transform: translateY(-2px);
        }
        
        .whatsapp-btn:active {
            transform: translateY(0);
        }
        
        .whatsapp-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }
        
        .whatsapp-btn:disabled:hover {
            background: var(--border);
            transform: none;
        }
        
        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }
        
        /* ========== LOADING ========== */
        .loading-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .loading-state i {
            font-size: 32px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ========== RESPONSIVIDADE ========== */
        @media (max-width: 768px) {
            .section-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .aula-header {
                flex-direction: column;
                text-align: center;
            }
            
            .whatsapp-turma-btn {
                width: 100%;
                justify-content: center;
            }
            
            .aluno-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .aluno-actions {
                width: 100%;
                justify-content: space-between;
            }
            
            .whatsapp-btn {
                flex: 1;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .content {
                padding: 12px;
            }
            
            .aula-info p {
                font-size: 12px;
                gap: 8px;
            }
        }
    </style>
</head>
<body class="dashboard-body">

    <!-- ========== MENU HAMBURGER MOBILE ========== -->
    <button class="menu-toggle" type="button" onclick="toggleSidebar()" aria-label="Abrir menu de navegação" aria-expanded="false">
        <i class="fas fa-bars"></i>
    </button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-racquet"></i></div>
            <span>B&T Tech</span>
        </div>
        <nav class="sidebar-menu">
            <a href="/dashboard" class="menu-item"><i class="fas fa-home"></i> Início</a>
            <a href="/alunos" class="menu-item"><i class="fas fa-users"></i> Alunos</a>
            <a href="/professores" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> Professores</a>
            <a href="/turmas" class="menu-item"><i class="fas fa-school"></i> Turmas</a>
            <a href="/semanal" class="menu-item"><i class="fas fa-calendar-week"></i> Grade Semanal</a>
            <a href="/confirmacoes" class="menu-item active"><i class="fab fa-whatsapp"></i> Confirmações</a>
            <a href="/relatorios" class="menu-item"><i class="fas fa-chart-bar"></i> Relatórios</a>
            <a href="/financeiro" class="menu-item"><i class="fas fa-dollar-sign"></i> Financeiro</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-details">
                    <p class="user-name" id="userName">Carregando...</p>
                    <p class="user-type" id="userType">Carregando...</p>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn" aria-label="Sair do sistema">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>
    </aside>

    <main class="main-content" id="main-content">
        <header class="top-header">
            <h1><i class="fab fa-whatsapp mr-2"></i>Confirmações</h1>
        </header>

        <div class="content">
            <div class="confirmacoes-container">
                <!-- Loading Skeleton -->
                <div id="loadingSkeleton" class="skeleton-section">
                    <div class="skeleton-card">
                        <div class="skeleton-header">
                            <div class="skeleton" style="width: 200px; height: 24px;"></div>
                        </div>
                        <div class="skeleton-body">
                            <div class="skeleton skeleton-aluno"></div>
                            <div class="skeleton skeleton-aluno"></div>
                            <div class="skeleton skeleton-aluno"></div>
                        </div>
                    </div>
                </div>

                <!-- Seção Hoje -->
                <div id="hojeSection" style="display: none;">
                    <div class="section-header">
                        <h2 class="section-title today"><i class="fas fa-calendar-day"></i> Hoje</h2>
                        <span class="date-badge" id="dataHoje"></span>
                    </div>
                    <div id="aulasHoje"></div>
                </div>

                <!-- Seção Amanhã -->
                <div id="amanhaSection" style="display: none;">
                    <div class="section-header" style="margin-top: 32px;">
                        <h2 class="section-title tomorrow"><i class="fas fa-sun"></i> Amanhã</h2>
                        <span class="date-badge" id="dataAmanha"></span>
                    </div>
                    <div id="aulasAmanha"></div>
                </div>

                <!-- Seção Próximos -->
                <div id="proximosSection" style="display: none;">
                    <div class="section-header" style="margin-top: 32px;">
                        <h2 class="section-title upcoming"><i class="fas fa-calendar-week"></i> Próximos Dias</h2>
                    </div>
                    <div id="aulasProximos"></div>
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="fas fa-calendar-times"></i>
                    <p>Nenhuma aula confirmada para os próximos dias</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script>
        let authToken = null;
        let aulasCache = {};

        // ========== TOAST NOTIFICATIONS ==========
        function showToast(message, type = 'info', duration = 4000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            
            toast.innerHTML = `
                <i class="fas ${icons[type] || icons.info}"></i>
                <span>${message}</span>
                <button onclick="this.parentElement.remove()" style="background:none;border:none;color:inherit;margin-left:auto;cursor:pointer;padding:4px;" aria-label="Fechar">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // ========== SIDEBAR TOGGLE ==========
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
            const overlay = document.querySelector('.sidebar-overlay');
            if (overlay) overlay.classList.toggle('show');
        }

        // ========== INICIALIZAÇÃO ==========
        document.addEventListener('DOMContentLoaded', async () => {
            authToken = localStorage.getItem('token');
            if (!authToken) { window.location.href = '/'; return; }

            const perfil = JSON.parse(localStorage.getItem('perfil')) || await getPerfil();
            if (!perfil) { window.location.href = '/'; return; }

            document.getElementById('userName').textContent = perfil.nome;
            document.getElementById('userType').textContent = perfil.tipo === 'dono' ? 'Administrador' : 'Professor';

            // Definir datas
            const hoje = new Date();
            document.getElementById('dataHoje').textContent = hoje.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
            
            const amanha = new Date(Date.now() + 86400000);
            document.getElementById('dataAmanha').textContent = amanha.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });

            loadAulas();
        });

        async function getPerfil() {
            try {
                const response = await fetch('/api/session', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                return data.perfil;
            } catch (e) {
                showToast('Erro ao carregar perfil', 'error');
                return null;
            }
        }

        // ========== CARREGAR AULAS ==========
        async function loadAulas() {
            try {
                const response = await fetch('/api/aulas-confirmacoes', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const dados = await response.json();
                
                // Esconder skeleton
                document.getElementById('loadingSkeleton').style.display = 'none';

                // Preencher cache
                [...(dados.hoje||[]), ...(dados.amanha||[]), ...(dados.proximos||[])].forEach(aula => {
                    const key = `${aula.id}_${aula.data_formatada}`;
                    aulasCache[key] = aula;
                });

                // Verificar se tem conteúdo
                const temHoje = dados.hoje && dados.hoje.length > 0;
                const temAmanha = dados.amanha && dados.amanha.length > 0;
                const temProximos = dados.proximos && dados.proximos.length > 0;

                if (!temHoje && !temAmanha && !temProximos) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                if (temHoje) {
                    document.getElementById('hojeSection').style.display = 'block';
                    renderAulas('aulasHoje', dados.hoje, 'hoje');
                }

                if (temAmanha) {
                    document.getElementById('amanhaSection').style.display = 'block';
                    renderAulas('aulasAmanha', dados.amanha, 'amanha');
                }

                if (temProximos) {
                    document.getElementById('proximosSection').style.display = 'block';
                    renderAulas('aulasProximos', dados.proximos, 'proximo');
                }
            } catch (error) {
                console.error('Erro ao carregar aulas:', error);
                document.getElementById('loadingSkeleton').style.display = 'none';
                showToast('Erro ao carregar aulas', 'error');
            }
        }

        // ========== RENDERIZAR AULAS ==========
        function renderAulas(containerId, aulas, tipo) {
            const container = document.getElementById(containerId);
            
            if (!aulas || aulas.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-calendar-times"></i>
                        <p>Nenhuma aula ${tipo === 'hoje' ? 'hoje' : tipo === 'amanha' ? 'amanhã' : 'nos próximos dias'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = aulas.map(aula => {
                const tipoClasse = tipo === 'hoje' ? '' : tipo === 'amanha' ? 'amanha' : 'proximo';
                const horario = aula.horario_inicio ? aula.horario_inicio.substring(0, 5) : '';
                const horarioFim = aula.horario_fim ? aula.horario_fim.substring(0, 5) : '';
                const cacheKey = `${aula.id}_${aula.data_formatada}`;
                
                const totalAlunos = aula.alunos.length;
                const confirmados = aula.alunos.filter(a => a.status === 'confirmado').length;
                const pendentes = aula.alunos.filter(a => a.status === 'pendente').length;
                
                return `
                <div class="aula-card">
                    <div class="aula-header ${tipoClasse}">
                        <div class="aula-info">
                            <h3>${escapeHtml(aula.nome)}</h3>
                            <p>
                                <i class="fas fa-user"></i> ${escapeHtml(aula.professor || 'Sem professor')}
                                &nbsp;|&nbsp;
                                <i class="fas fa-clock"></i> ${horario} às ${horarioFim}
                                &nbsp;|&nbsp;
                                <i class="fas fa-users"></i> ${confirmados}/${totalAlunos} confirmados
                                ${pendentes > 0 ? `<span class="pendente-badge">${pendentes} pendente${pendentes > 1 ? 's' : ''}</span>` : ''}
                            </p>
                        </div>
                        <button onclick="enviarMensagemTurma('${cacheKey}')" class="whatsapp-turma-btn" title="Enviar mensagem de confirmação para todos os alunos">
                            <i class="fab fa-whatsapp"></i> Enviar para Turma
                        </button>
                    </div>
                    <div class="alunos-list">
                        ${aula.alunos.map(aluno => {
                            const telefone = aluno.telefone ? aluno.telefone.replace(/\D/g, '') : '';
                            
                            return `
                            <div class="aluno-item">
                                <div class="aluno-info">
                                    <div class="aluno-avatar">${escapeHtml(aluno.nome.charAt(0))}</div>
                                    <div>
                                        <div class="aluno-nome">${escapeHtml(aluno.nome)}</div>
                                        <div class="aluno-telefone">${aluno.telefone ? escapeHtml(aluno.telefone) : 'Sem telefone'}</div>
                                    </div>
                                </div>
                                <div class="aluno-actions">
                                    <span class="status-badge ${aluno.status}">${getStatusLabel(aluno.status)}</span>
                                    <button onclick="enviarLinkAluno('${cacheKey}', '${aluno.id}')" class="whatsapp-btn" ${!telefone ? 'disabled' : ''} title="${telefone ? 'Enviar link de confirmação' : 'Sem telefone cadastrado'}">
                                        <i class="fab fa-whatsapp"></i>
                                    </button>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </div>
                `;
            }).join('');
        }

        function getStatusLabel(status) {
            const labels = {
                'pendente': 'Aguardando',
                'confirmado': 'Confirmado',
                'cancelado': 'Cancelado'
            };
            return labels[status] || 'Aguardando';
        }

        // ========== ESCAPE HTML ==========
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== ENVIAR WHATSAPP ==========
        function limparTexto(texto) {
            if (!texto) return '';
            return texto.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/[\u200B-\u200D\uFEFF]/g, '').trim();
        }

        function enviarLinkAluno(cacheKey, alunoId) {
            const aula = aulasCache[cacheKey];
            if (!aula) return;

            const aluno = aula.alunos.find(a => a.id === alunoId);
            if (!aluno || !aluno.telefone) {
                showToast('Aluno sem telefone cadastrado!', 'warning');
                return;
            }

            const telefone = aluno.telefone.replace(/\D/g, '');
            const horario = aula.horario_inicio ? aula.horario_inicio.substring(0, 5) : '-';
            const horarioFim = aula.horario_fim ? aula.horario_fim.substring(0, 5) : '-';
            const linkConfirm = `https://saasbt.vercel.app/confirmar?aluno=${aluno.id}`;

            const colegas = aula.alunos.filter(a => a.id !== alunoId).map(a => `  - ${limparTexto(a.nome)}`).join('\n');

            const mensagem = 
`*Confirmação de Presença* - B&T Tech

Olá, ${limparTexto(aluno.nome)}!

Você tem uma aula agendada:

Turma: ${limparTexto(aula.nome)}
Professor: ${limparTexto(aula.professor) || 'A definir'}
Data: ${limparTexto(aula.data_formatada)}
Horário: ${horario} às ${horarioFim}${colegas ? '\n\nColegas de turma:\n' + colegas : ''}

Confirme ou cancele sua presença pelo link abaixo:
${linkConfirm}

B&T Tech aguarda você!`;

            const urlWhats = `https://wa.me/55${telefone}?text=${encodeURIComponent(mensagem)}`;
            window.open(urlWhats, '_blank');
            showToast(`WhatsApp aberto para ${aluno.nome}`, 'success');
        }

        function enviarMensagemTurma(cacheKey) {
            const aula = aulasCache[cacheKey];
            if (!aula) return;

            const comTelefone = aula.alunos.filter(a => a.telefone);
            if (comTelefone.length === 0) {
                showToast('Nenhum aluno com telefone nesta turma!', 'warning');
                return;
            }

            const semTelefone = aula.alunos.length - comTelefone.length;
            
            // Usar toast em vez de confirm
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 400px;">
                    <div class="modal-header">
                        <h3><i class="fab fa-whatsapp" style="color: #25D366;"></i> Enviar Mensagens</h3>
                        <button class="close" onclick="this.closest('.modal').remove()">&times;</button>
                    </div>
                    <div class="modal-body" style="text-align: center;">
                        <p style="margin-bottom: 16px;">Enviar mensagem para ${comTelefone.length} aluno(s)?</p>
                        ${semTelefone > 0 ? `<p style="color: var(--text-muted); font-size: 13px;">(${semTelefone} sem telefone serão ignorados)</p>` : ''}
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-primary" id="confirmarEnvio">
                            <i class="fab fa-whatsapp"></i> Enviar
                        </button>
                        <button class="btn btn-secondary" onclick="this.closest('.modal').remove()">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            document.getElementById('confirmarEnvio').onclick = () => {
                document.body.removeChild(modal);
                comTelefone.forEach((aluno, index) => {
                    setTimeout(() => {
                        enviarLinkAluno(cacheKey, aluno.id);
                    }, index * 200); // Reduzido para 200ms
                });
                showToast(`Enviando ${comTelefone.length} mensagens...`, 'success');
            };
        }

        // ========== LOGOUT ==========
        async function logout() {
            try {
                await fetch('/api/logout', { 
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
            } catch (e) {}
            localStorage.removeItem('token');
            localStorage.removeItem('perfil');
            window.location.href = '/';
        }

        // Fechar modal com ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal').forEach(m => m.remove());
            }
        });

        // Fechar modal ao clicar fora
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                e.target.remove();
            }
        });

        // Recarrega os dados quando a página volta a ficar visível
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                loadAulas();
            }
        });

        // Também recarrega quando a janela ganha foco
        window.addEventListener('focus', function() {
            loadAulas();
        });

    </script>
<!-- PATCH MOBILE GLOBAL SCRIPT -->

<script>
(function () {
    window.toggleSidebar = function () {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        if (!sidebar) return;

        const willOpen = !sidebar.classList.contains('show');
        sidebar.classList.toggle('show', willOpen);
        if (overlay) overlay.classList.toggle('show', willOpen);
        document.body.classList.toggle('menu-open', willOpen);
    };

    document.addEventListener('DOMContentLoaded', function () {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        const menuToggle = document.querySelector('.menu-toggle');

        if (overlay) {
            overlay.addEventListener('click', function () {
                if (sidebar) sidebar.classList.remove('show');
                overlay.classList.remove('show');
                document.body.classList.remove('menu-open');
            });
        }

        if (menuToggle) {
            menuToggle.setAttribute('type', 'button');
            menuToggle.setAttribute('aria-expanded', 'false');
            menuToggle.addEventListener('click', function () {
                const isOpen = sidebar && sidebar.classList.contains('show');
                menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });
        }

        document.querySelectorAll('.sidebar .menu-item').forEach(function (link) {
            link.addEventListener('click', function () {
                if (window.innerWidth <= 768) {
                    if (sidebar) sidebar.classList.remove('show');
                    if (overlay) overlay.classList.remove('show');
                    document.body.classList.remove('menu-open');
                }
            });
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                if (sidebar) sidebar.classList.remove('show');
                if (overlay) overlay.classList.remove('show');
                document.body.classList.remove('menu-open');
            }
        });
    });
})();
</script>
