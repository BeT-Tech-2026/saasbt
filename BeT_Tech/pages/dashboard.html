<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - B&T Tech</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .quick-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .quick-btn:hover { transform: translateY(-2px); }
        .quick-btn.primary { background: var(--primary); color: white; }
        .quick-btn.secondary { background: var(--secondary); color: white; }
        .quick-btn i { font-size: 16px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid var(--border);
        }
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }
        .stat-icon.green { background: linear-gradient(135deg, #10b981, #059669); }
        .stat-icon.blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .stat-icon.purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .stat-icon.orange { background: linear-gradient(135deg, #f59e0b, #d97706); }

        .stat-info .stat-value { font-size: 28px; font-weight: 700; color: var(--text-primary); }
        .stat-info .stat-label { font-size: 13px; color: var(--text-muted); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .occupancy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .occupancy-card {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .occupancy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--card-color, #3b82f6);
        }
        .occupancy-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .occupancy-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
        }
        .occupancy-percent {
            font-size: 20px;
            font-weight: 700;
            color: var(--card-color, #3b82f6);
        }
        .occupancy-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .occupancy-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .occupancy-details {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }
        .occupancy-vagas {
            font-weight: 600;
        }
        .occupancy-vagas.cheio { color: #ef4444; }
        .occupancy-vagas.lotado { color: #f59e0b; }
        .occupancy-vagas.disponivel { color: #10b981; }

        .turma-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .turma-mini-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .turma-mini-info { flex: 1; }
        .turma-mini-nome { font-weight: 600; font-size: 14px; }
        .turma-mini-prof { font-size: 12px; color: var(--text-muted); }
        .turma-mini-qtd {
            background: var(--bg-card);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .chart-wrapper {
            height: 200px;
            margin-top: 16px;
        }
    </style>
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-volleyball-ball"></i></div>
            <span>B&T Tech</span>
        </div>

        <nav class="sidebar-menu">
            <a href="/dashboard" class="menu-item active"><i class="fas fa-home"></i> Início</a>
            <a href="/alunos" class="menu-item"><i class="fas fa-users"></i> Alunos</a>
            <a href="/professores" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> Professores</a>
            <a href="/turmas" class="menu-item"><i class="fas fa-school"></i> Turmas</a>
            <a href="/semanal" class="menu-item"><i class="fas fa-calendar-week"></i> Grade Semanal</a>
            <a href="/painel" class="menu-item"><i class="fas fa-clipboard-list"></i> Painel do Dia</a>
            <a href="/relatorios" class="menu-item"><i class="fas fa-chart-bar"></i> Relatórios</a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-details">
                    <p class="user-name" id="userName">Carregando...</p>
                    <p class="user-type" id="userType">Carregando...</p>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1><i class="fas fa-home mr-2"></i>Dashboard</h1>
            <span class="date" id="currentDate"></span>
        </header>

        <div class="content">
            <!-- Ações Rápidas -->
            <div class="quick-actions">
                <button class="quick-btn primary" onclick="abrirModalAluno()">
                    <i class="fas fa-user-plus"></i> Novo Aluno
                </button>
                <button class="quick-btn secondary" onclick="abrirModalTurma()">
                    <i class="fas fa-school"></i> Nova Turma
                </button>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <p class="stat-value" id="totalAlunos">0</p>
                        <p class="stat-label">Alunos Ativos</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-school"></i></div>
                    <div class="stat-info">
                        <p class="stat-value" id="totalTurmas">0</p>
                        <p class="stat-label">Turmas Ativas</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon purple"><i class="fas fa-calendar-day"></i></div>
                    <div class="stat-info">
                        <p class="stat-value" id="aulasHoje">0</p>
                        <p class="stat-label">Aulas Hoje</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon orange"><i class="fas fa-user-check"></i></div>
                    <div class="stat-info">
                        <p class="stat-value" id="alunosDia">0</p>
                        <p class="stat-label">Alunos no Dia</p>
                    </div>
                </div>
            </div>

            <!-- Grid Principal -->
            <div class="dashboard-grid">
                <!-- Coluna Esquerda: Ocupação -->
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-chart-bar mr-2"></i>Ocupação das Turmas</h2>
                    </div>
                    <div class="card-body">
                        <div class="chart-wrapper">
                            <canvas id="ocupacaoChart"></canvas>
                        </div>
                        <div class="occupancy-grid" id="occupancyGrid"></div>
                    </div>
                </div>

                <!-- Coluna Direita: Aulas Hoje -->
                <div class="card">
                    <div class="card-header">
                        <h2><i class="fas fa-clock mr-2"></i>Aulas de Hoje</h2>
                    </div>
                    <div class="card-body" style="max-height: 500px; overflow-y: auto;">
                        <div id="aulasHojeList"></div>
                    </div>
                </div>
            </div>

            <!-- Alunos por Dia -->
            <div class="card" style="margin-top: 24px;">
                <div class="card-header">
                    <h2><i class="fas fa-users mr-2"></i>Alunos por Dia da Semana</h2>
                </div>
                <div class="card-body">
                    <div class="chart-wrapper" style="height: 180px;">
                        <canvas id="alunosDiaChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Novo Aluno -->
    <div id="modalAluno" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Novo Aluno</h3>
                <button onclick="fecharModalAluno()" class="close">&times;</button>
            </div>
            <form id="alunoForm" class="modal-body">
                <div class="form-group">
                    <label>Nome *</label>
                    <input type="text" id="alunoNome" required placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label>Telefone</label>
                    <input type="text" id="alunoTelefone" placeholder="(00) 00000-0000">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="alunoEmail" placeholder="email@exemplo.com">
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <button type="button" onclick="fecharModalAluno()" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Nova Turma -->
    <div id="modalTurma" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nova Turma</h3>
                <button onclick="fecharModalTurma()" class="close">&times;</button>
            </div>
            <form id="turmaForm" class="modal-body">
                <div class="form-group">
                    <label>Nome da Turma *</label>
                    <input type="text" id="turmaNome" required placeholder="Ex: Avançado A">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Início *</label>
                        <input type="time" id="turmaInicio" required>
                    </div>
                    <div class="form-group">
                        <label>Fim *</label>
                        <input type="time" id="turmaFim" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Dia da Semana *</label>
                    <select id="turmaDia" required>
                        <option value="">Selecione...</option>
                        <option value="segunda">Segunda</option>
                        <option value="terca">Terça</option>
                        <option value="quarta">Quarta</option>
                        <option value="quinta">Quinta</option>
                        <option value="sexta">Sexta</option>
                        <option value="sabado">Sábado</option>
                        <option value="domingo">Domingo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Professor</label>
                    <select id="turmaProfessor">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Limite de Alunos</label>
                    <input type="number" id="turmaLimite" value="4" min="1" max="20">
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <button type="button" onclick="fecharModalTurma()" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let perfil = null;
        let turmasData = [];
        let chartOcupacao = null;
        let chartAlunosDia = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/'; return; }

            perfil = JSON.parse(localStorage.getItem('perfil'));

            if (!perfil) {
                const response = await fetch('/api/session', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) { window.location.href = '/'; return; }
                const data = await response.json();
                perfil = data.perfil;
                localStorage.setItem('perfil', JSON.stringify(perfil));
            }

            document.getElementById('userName').textContent = perfil.nome;
            document.getElementById('userType').textContent = perfil.tipo === 'dono' ? 'Administrador' : 'Professor';
            
            const data = new Date().toLocaleDateString('pt-BR', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
            document.getElementById('currentDate').textContent = data;

            if (perfil.tipo !== 'dono') {
                document.querySelector('a[href="/professores"]').style.display = 'none';
            }

            await loadDashboard();
            await loadProfessoresSelect();
        });

        async function loadDashboard() {
            const token = localStorage.getItem('token');
            
            const response = await fetch('/api/dashboard', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const { alunosAtivos, turmasAtivas, aulasHoje } = await response.json();

            document.getElementById('totalAlunos').textContent = alunosAtivos || 0;
            document.getElementById('totalTurmas').textContent = turmasAtivas || 0;
            document.getElementById('aulasHoje').textContent = aulasHoje?.length || 0;
            document.getElementById('alunosDia').textContent = aulasHoje?.length || 0;

            // Lista aulas de hoje
            const lista = document.getElementById('aulasHojeList');
            if (aulasHoje && aulasHoje.length > 0) {
                lista.innerHTML = aulasHoje.map(t => {
                    const cor = t.perfis?.cor || '#3b82f6';
                    return `
                    <div class="turma-mini" style="border-left: 4px solid ${cor};">
                        <div class="turma-mini-avatar" style="background: ${cor};">
                            ${t.nome.charAt(0)}
                        </div>
                        <div class="turma-mini-info">
                            <div class="turma-mini-nome">${t.nome}</div>
                            <div class="turma-mini-prof">${t.perfis?.nome || 'Sem professor'} • ${t.horario_inicio} - ${t.horario_fim}</div>
                        </div>
                    </div>
                `}).join('');
            } else {
                lista.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-xmark"></i><p>Nenhuma aula hoje</p></div>';
            }

            await loadTurmasOcupacao();
        }

        async function loadTurmasOcupacao() {
            const token = localStorage.getItem('token');
            const response = await fetch('/api/turmas', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            turmasData = await response.json();

            for (let turma of turmasData) {
                const res = await fetch(`/api/matriculas/${turma.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const matriculas = await res.json();
                turma.alunosMatriculados = matriculas.filter(m => m.ativa).length;
            }

            renderOccupancyChart();
            renderOccupancyCards();
            renderAlunosDiaChart();
        }

        function renderOccupancyChart() {
            const ctx = document.getElementById('ocupacaoChart').getContext('2d');
            
            // Ordena turmas por ocupação
            const sortedTurmas = [...turmasData].sort((a, b) => {
                const pctA = a.limite_alunos > 0 ? a.alunosMatriculados / a.limite_alunos : 0;
                const pctB = b.limite_alunos > 0 ? b.alunosMatriculados / b.limite_alunos : 0;
                return pctB - pctA;
            }).slice(0, 7);

            const labels = sortedTurmas.map(t => t.nome);
            const dataOcupados = sortedTurmas.map(t => t.alunosMatriculados);
            const dataVagas = sortedTurmas.map(t => Math.max(0, t.limite_alunos - t.alunosMatriculados));
            const colors = sortedTurmas.map(t => t.perfis?.cor || '#3b82f6');

            if (chartOcupacao) chartOcupacao.destroy();

            chartOcupacao = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Ocupados',
                            data: dataOcupados,
                            backgroundColor: colors,
                            borderRadius: 6,
                            barPercentage: 0.7
                        },
                        {
                            label: 'Vagas',
                            data: dataVagas,
                            backgroundColor: '#e5e7eb',
                            borderRadius: 6,
                            barPercentage: 0.7
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            stacked: true,
                            beginAtZero: true,
                            max: Math.max(...turmasData.map(t => t.limite_alunos)) + 2,
                            grid: { display: false }
                        },
                        y: {
                            stacked: true,
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function renderOccupancyCards() {
            const container = document.getElementById('occupancyGrid');
            
            // Ordena por % de ocupação
            const sortedTurmas = [...turmasData].sort((a, b) => {
                const pctA = a.limite_alunos > 0 ? a.alunosMatriculados / a.limite_alunos : 0;
                const pctB = b.limite_alunos > 0 ? b.alunosMatriculados / b.limite_alunos : 0;
                return pctB - pctA;
            });

            container.innerHTML = sortedTurmas.map(t => {
                const percentual = t.limite_alunos > 0 ? Math.round((t.alunosMatriculados / t.limite_alunos) * 100) : 0;
                const cor = t.perfis?.cor || '#3b82f6';
                const vagas = t.limite_alunos - t.alunosMatriculados;
                
                let statusClass = 'disponivel';
                let statusText = `${vagas} vagas`;
                
                if (vagas === 0) {
                    statusClass = 'cheio';
                    statusText = 'Lotado!';
                } else if (vagas <= 1) {
                    statusClass = 'lotado';
                    statusText = `${vagas} vaga`;
                }

                // Cor da barra baseada no percentual
                let barColor = '#10b981'; // verde
                if (percentual >= 75) barColor = '#f59e0b'; // laranja
                if (percentual >= 100) barColor = '#ef4444'; // vermelho

                return `
                <div class="occupancy-card" style="--card-color: ${cor}">
                    <div class="occupancy-header">
                        <div class="occupancy-title">${t.nome}</div>
                        <div class="occupancy-percent">${percentual}%</div>
                    </div>
                    <div class="occupancy-bar">
                        <div class="occupancy-fill" style="width: ${Math.min(percentual, 100)}%; background: ${barColor};"></div>
                    </div>
                    <div class="occupancy-details">
                        <span>${t.alunosMatriculados}/${t.limite_alunos} alunos</span>
                        <span class="occupancy-vagas ${statusClass}">${statusText}</span>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderAlunosDiaChart() {
            const ctx = document.getElementById('alunosDiaChart').getContext('2d');
            
            const dias = ['segunda', 'terca', 'quarta', 'quinta', 'sexta', 'sabado', 'domingo'];
            const diasLabel = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];
            
            const dataAlunos = dias.map(dia => {
                return turmasData
                    .filter(t => t.dia_semana === dia)
                    .reduce((acc, t) => acc + (t.alunosMatriculados || 0), 0);
            });

            // Cores gradient para cada barra
            const colors = dataAlunos.map(v => v > 0 ? '#3b82f6' : '#e5e7eb');

            if (chartAlunosDia) chartAlunosDia.destroy();

            chartAlunosDia = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: diasLabel,
                    datasets: [{
                        label: 'Alunos',
                        data: dataAlunos,
                        backgroundColor: colors,
                        borderRadius: 8,
                        barPercentage: 0.6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            ticks: { stepSize: 1 },
                            grid: { color: '#f3f4f6' }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Funções Modal
        function abrirModalAluno() {
            document.getElementById('modalAluno').classList.remove('hidden');
            document.getElementById('alunoForm').reset();
        }
        function fecharModalAluno() {
            document.getElementById('modalAluno').classList.add('hidden');
        }
        document.getElementById('alunoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const nome = document.getElementById('alunoNome').value;
            const telefone = document.getElementById('alunoTelefone').value;
            const email = document.getElementById('alunoEmail').value;

            const response = await fetch('/api/alunos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ nome, telefone, email })
            });

            if (response.ok) {
                alert('Aluno cadastrado com sucesso!');
                fecharModalAluno();
                loadDashboard();
            } else {
                alert('Erro ao cadastrar');
            }
        });

        async function loadProfessoresSelect() {
            const token = localStorage.getItem('token');
            const response = await fetch('/api/professores', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const professores = await response.json();
            const select = document.getElementById('turmaProfessor');
            select.innerHTML = '<option value="">Selecione...</option>' + 
                professores.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
        }

        function abrirModalTurma() {
            document.getElementById('modalTurma').classList.remove('hidden');
            document.getElementById('turmaForm').reset();
        }
        function fecharModalTurma() {
            document.getElementById('modalTurma').classList.add('hidden');
        }
        document.getElementById('turmaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const nome = document.getElementById('turmaNome').value;
            const horario_inicio = document.getElementById('turmaInicio').value;
            const horario_fim = document.getElementById('turmaFim').value;
            const dia_semana = document.getElementById('turmaDia').value;
            const professor_id = document.getElementById('turmaProfessor').value || null;
            const limite_alunos = parseInt(document.getElementById('turmaLimite').value);

            const response = await fetch('/api/turmas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ nome, horario_inicio, horario_fim, dia_semana, professor_id, limite_alunos })
            });

            if (response.ok) {
                alert('Turma criada com sucesso!');
                fecharModalTurma();
                loadDashboard();
            } else {
                alert('Erro ao criar');
            }
        });

        async function logout() {
            const token = localStorage.getItem('token');
            await fetch('/api/logout', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
            localStorage.removeItem('token');
            localStorage.removeItem('perfil');
            window.location.href = '/';
        }
    </script>
</body>
</html>
