<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Grade Semanal - B&T Tech</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .view-toggle { display: flex; gap: 4px; background: var(--bg-dark); padding: 4px; border-radius: 8px; }
        .view-btn { padding: 8px 16px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; border-radius: 6px; font-weight: 500; }
        .view-btn.active { background: var(--primary); color: white; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); }
        .calendar-header { background: var(--bg-dark); padding: 10px; text-align: center; font-weight: 600; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; }
        .calendar-day { background: var(--bg-darker); min-height: 80px; padding: 6px; }
        .calendar-day.other-month { opacity: 0.4; }
        .calendar-day.today { background: rgba(59, 130, 246, 0.1); }
        .day-number { font-weight: 600; margin-bottom: 4px; font-size: 13px; }
        .calendar-day.today .day-number { color: var(--primary); }
        .calendar-turma { padding: 4px 6px; margin-bottom: 3px; border-radius: 3px; font-size: 10px; cursor: pointer; border-left: 3px solid; background: var(--bg-dark); }
        .turma-horario { font-size: 9px; opacity: 0.7; }
        .turma-nome { font-weight: 500; }
        
        .week-wrapper { overflow-x: auto; }
        .week-table { width: 100%; border-collapse: collapse; min-width: 700px; }
        .week-table th, .week-table td { border: 1px solid var(--border); padding: 0; vertical-align: top; }
        .week-table th { background: var(--bg-dark); padding: 10px; }
        .week-table th.day-col { text-align: center; }
        .week-table th .day-name { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; }
        .week-table th .day-num { display: block; font-size: 18px; font-weight: 700; }
        .week-table th.today { background: rgba(59, 130, 246, 0.15); }
        .week-table th.today .day-num { color: var(--primary); }
        
        .time-label { background: var(--bg-dark); padding: 8px; text-align: center; font-size: 11px; font-weight: 600; width: 60px; }
        
        .day-cell { min-height: 50px; background: var(--bg-darker); }
        .day-cell.empty { background: rgba(0,0,0,0.05); }
        
        .aula-card {
            margin: 2px;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            border-left: 4px solid;
        }
        .aula-card:hover { transform: scale(1.02); }
        .aula-nome { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .aula-prof { font-size: 9px; opacity: 0.7; }
        .aula-time { font-size: 8px; opacity: 0.6; }
        
        .grade-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .grade-nav { display: flex; align-items: center; gap: 10px; }
        .nav-btn { width: 32px; height: 32px; border: none; background: var(--bg-dark); color: var(--text); border-radius: 6px; cursor: pointer; }
        .nav-btn:hover { background: var(--primary); color: white; }
        .periodo-label { font-weight: 600; font-size: 15px; min-width: 160px; text-align: center; }
        
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .info-item label { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; }
        .info-item span { font-weight: 500; }
        
        .aluno-item { display: flex; align-items: center; padding: 8px; background: var(--bg-dark); border-radius: 4px; margin-bottom: 4px; }
        .aluno-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; margin-right: 8px; font-size: 10px; }
        .aluno-nome { font-weight: 500; font-size: 12px; }
    </style>
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-volleyball-ball"></i></div>
            <span>B&T Tech</span>
        </div>
        <nav class="sidebar-menu">
            <a href="/dashboard" class="menu-item"><i class="fas fa-home"></i> Início</a>
            <a href="/alunos" class="menu-item"><i class="fas fa-users"></i> Alunos</a>
            <a href="/professores" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> Professores</a>
            <a href="/turmas" class="menu-item"><i class="fas fa-school"></i> Turmas</a>
            <a href="/semanal" class="menu-item active"><i class="fas fa-calendar-week"></i> Grade Semanal</a>
            <a href="/painel" class="menu-item"><i class="fas fa-clipboard-list"></i> Painel do Dia</a>
            <a href="/relatorios" class="menu-item"><i class="fas fa-chart-bar"></i> Relatórios</a>
            <a href="/financeiro" class="menu-item "><i class="fas fa-dollar-sign"></i> Financeiro</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-details">
                    <p class="user-name" id="userName">Carregando...</p>
                    <p class="user-type" id="userType">Carregando...</p>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1><i class="fas fa-calendar-week mr-2"></i>Grade Semanal</h1>
            <div class="view-toggle">
                <button onclick="changeView('month')" id="btnMonth" class="view-btn">Mês</button>
                <button onclick="changeView('week')" id="btnWeek" class="view-btn active">Semana</button>
            </div>
        </header>

        <div class="content">
            <div class="grade-controls">
                <div class="grade-nav">
                    <button onclick="navegar(-1)" class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                    <span id="periodoLabel" class="periodo-label">Abril 2024</span>
                    <button onclick="navegar(1)" class="nav-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
                <button onclick="voltarHoje()" class="btn btn-secondary">Hoje</button>
            </div>

            <div id="viewMonth" class="card" style="display: none;">
                <div class="card-body no-padding">
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
            </div>

            <div id="viewWeek" class="card">
                <div class="card-body no-padding">
                    <div class="week-wrapper">
                        <table class="week-table" id="weekTable"></table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modalDetalhesAula" class="modal hidden">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h3 id="modalTurmaNome">Detalhes</h3>
                <button onclick="fecharModal()" class="close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="info-grid">
                    <div class="info-item"><label>Dia</label><span id="modalTurmaDia">-</span></div>
                    <div class="info-item"><label>Horário</label><span id="modalTurmaHorario">-</span></div>
                    <div class="info-item"><label>Professor</label><span id="modalTurmaProfessor">-</span></div>
                    <div class="info-item"><label>Tipo</label><span id="modalTurmaTipo">-</span></div>
                </div>
                <h4 style="font-size: 13px; margin-bottom: 10px; color: var(--text-secondary);">
                    <i class="fas fa-users"></i> Alunos (<span id="countAlunos">0</span>)
                </h4>
                <div id="loadingAlunos" style="text-align: center; padding: 15px;"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
                <p id="semAlunos" class="empty" style="display: none;">Nenhum aluno</p>
                <div id="listaAlunosContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let perfil = null;
        let currentDate = new Date();
        let currentView = 'week';
        let turmas = [];
        let turmaSelecionada = null;

        const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
        const diasSemanaFull = ['domingo', 'segunda', 'terça', 'quarta', 'quinta', 'sexta', 'sábado'];

        const HORA_INICIO = 6;
        const HORA_FIM = 22;
        const ALTURA_HORA = 50;

        function formatarDataLocal(data) {
            const ano = data.getFullYear();
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const dia = String(data.getDate()).padStart(2, '0');
            return `${ano}-${mes}-${dia}`;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/'; return; }
            
            perfil = JSON.parse(localStorage.getItem('perfil')) || JSON.parse(sessionStorage.getItem('perfil'));
            
            if (!perfil) {
                fetch('/api/session', { headers: { 'Authorization': 'Bearer ' + token } })
                .then(res => res.json())
                .then(data => {
                    perfil = data.perfil;
                    localStorage.setItem('perfil', JSON.stringify(perfil));
                    init();
                });
            } else {
                init();
            }
        });

        function init() {
            document.getElementById('userName').textContent = perfil.nome;
            document.getElementById('userType').textContent = perfil.tipo === 'dono' ? 'Administrador' : 'Professor';
            if (perfil.tipo !== 'dono') document.querySelector('a[href="/professores"]').style.display = 'none';
            loadTurmas();
        }

        function loadTurmas() {
            const token = localStorage.getItem('token');
            fetch('/api/turmas', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(res => res.json())
            .then(data => {
                turmas = data || [];
                render();
            });
        }

        function changeView(view) {
            currentView = view;
            document.getElementById('btnMonth').className = view === 'month' ? 'view-btn active' : 'view-btn';
            document.getElementById('btnWeek').className = view === 'week' ? 'view-btn active' : 'view-btn';
            document.getElementById('viewMonth').style.display = view === 'month' ? 'block' : 'none';
            document.getElementById('viewWeek').style.display = view === 'week' ? 'block' : 'none';
            render();
        }

        function navegar(direcao) {
            if (currentView === 'month') {
                currentDate.setMonth(currentDate.getMonth() + direcao);
            } else {
                currentDate.setDate(currentDate.getDate() + (direcao * 7));
            }
            render();
        }

        function voltarHoje() { currentDate = new Date(); render(); }

        function render() {
            const periodoLabel = document.getElementById('periodoLabel');
            if (currentView === 'month') {
                periodoLabel.textContent = meses[currentDate.getMonth()] + ' ' + currentDate.getFullYear();
                renderMonth();
            } else {
                periodoLabel.textContent = getWeekLabel();
                renderWeek();
            }
        }

        function getWeekLabel() {
            const primeiroDia = getPrimeiroDiaSemana();
            const ultimoDia = new Date(primeiroDia);
            ultimoDia.setDate(ultimoDia.getDate() + 6);
            return primeiroDia.toLocaleDateString('pt-BR', { day: 'numeric' }) + ' - ' + 
                   ultimoDia.toLocaleDateString('pt-BR', { day: 'numeric' }) + ' de ' + 
                   meses[primeiroDia.getMonth()];
        }

        function getPrimeiroDiaSemana() {
            const hoje = new Date(currentDate);
            return new Date(hoje.setDate(hoje.getDate() - hoje.getDay()));
        }

        function getTurmasDoDia(diaSemana, data) {
            const regulares = turmas.filter(t => 
                t.dia_semana && t.dia_semana.toLowerCase() === diaSemana.toLowerCase() && !t.data_avulsa
            );
            const avulsas = turmas.filter(t => t.data_avulsa === data);
            return [...regulares, ...avulsas];
        }

        function getCorTurma(t) {
            return t.perfis?.cor || '#6b7280';
        }

        function renderMonth() {
            const ano = currentDate.getFullYear();
            const mes = currentDate.getMonth();
            const primeiroDia = new Date(ano, mes, 1);
            const ultimoDia = new Date(ano, mes + 1, 0);
            const diasNoMes = ultimoDia.getDate();
            const primeiroDiaSemana = primeiroDia.getDay();
            const hoje = new Date();
            
            let html = '';
            for (let i = 0; i < diasSemana.length; i++) html += '<div class="calendar-header">' + diasSemana[i] + '</div>';
            
            const ultimoDiaMesAnterior = new Date(ano, mes, 0).getDate();
            for (let i = primeiroDiaSemana - 1; i >= 0; i--) {
                html += '<div class="calendar-day other-month"><div class="day-number">' + (ultimoDiaMesAnterior - i) + '</div></div>';
            }
            
            for (let dia = 1; dia <= diasNoMes; dia++) {
                const dataAtual = new Date(ano, mes, dia);
                const diaSemana = diasSemanaFull[dataAtual.getDay()];
                const dataFormatada = formatarDataLocal(dataAtual);
                const ehHoje = dataAtual.toDateString() === hoje.toDateString();
                
                const turmasDoDia = getTurmasDoDia(diaSemana, dataFormatada);
                
                let turmasHtml = turmasDoDia.map(t => {
                    const labelHorario = t.data_avulsa ? new Date(t.data_avulsa).toLocaleDateString('pt-BR') : t.horario_inicio;
                    const corTurma = getCorTurma(t);
                    return '<div class="calendar-turma" onclick="abrirDetalhesTurma(\'' + t.id + '\', \'' + dataFormatada + '\')" style="border-left-color: ' + corTurma + '; background: ' + corTurma + '20;">' +
                        '<div class="turma-horario">' + labelHorario + '</div>' +
                        '<div class="turma-nome">' + (t.data_avulsa ? '⭐ ' : '') + t.nome + '</div>' +
                    '</div>';
                }).join('');
                
                html += '<div class="calendar-day' + (ehHoje ? ' today' : '') + '"><div class="day-number">' + dia + '</div>' + turmasHtml + '</div>';
            }
            
            const totalCells = Math.ceil((primeiroDiaSemana + diasNoMes) / 7) * 7;
            for (let dia = 1; dia <= totalCells - (primeiroDiaSemana + diasNoMes); dia++) {
                html += '<div class="calendar-day other-month"><div class="day-number">' + dia + '</div></div>';
            }
            
            document.getElementById('calendarGrid').innerHTML = html;
        }

        function renderWeek() {
            const primeiroDia = getPrimeiroDiaSemana();
            const hoje = new Date();
            let html = '';
            
            // Cabeçalho com dias
            html += '<thead><tr><th class="time-label"></th>';
            for (let i = 0; i < 7; i++) {
                const dataAtual = new Date(primeiroDia);
                dataAtual.setDate(primeiroDia.getDate() + i);
                const ehHoje = dataAtual.toDateString() === hoje.toDateString();
                html += '<th class="day-col' + (ehHoje ? ' today' : '') + '">' +
                    '<span class="day-name">' + diasSemana[i] + '</span>' +
                    '<span class="day-num">' + dataAtual.getDate() + '</span>' +
                '</th>';
            }
            html += '</tr></thead>';
            
            // Corpo da tabela
            html += '<tbody>';
            
            // Linhas de hora em hora
            for (let h = HORA_INICIO; h <= HORA_FIM; h++) {
                const hora = h.toString().padStart(2, '0') + ':00';
                html += '<tr>';
                html += '<td class="time-label">' + hora + '</td>';
                
                for (let i = 0; i < 7; i++) {
                    const dataAtual = new Date(primeiroDia);
                    dataAtual.setDate(primeiroDia.getDate() + i);
                    const diaSemana = diasSemanaFull[dataAtual.getDay()];
                    const dataFormatada = formatarDataLocal(dataAtual);
                    
                    // Turmas neste dia e hora
                    const turmasDoDia = getTurmasDoDia(diaSemana, dataFormatada);
                    
                    // Filtrar turmas que começam nesta hora
                    const turmasNestaHora = turmasDoDia.filter(t => {
                        const horaInicio = t.horario_inicio.substring(0, 5);
                        return horaInicio === hora;
                    });
                    
                    if (turmasNestaHora.length > 0) {
                        html += '<td class="day-cell">';
                        turmasNestaHora.forEach(t => {
                            const cor = getCorTurma(t);
                            html += '<div class="aula-card" onclick="abrirDetalhesTurma(\'' + t.id + '\', \'' + dataFormatada + '\')" ' +
                                'style="background: ' + cor + '20; border-left-color: ' + cor + ';">' +
                                '<div class="aula-time">' + t.horario_inicio + ' - ' + t.horario_fim + '</div>' +
                                '<div class="aula-nome">' + t.nome + '</div>' +
                                '<div class="aula-prof">' + (t.perfis?.nome || '') + '</div>' +
                            '</div>';
                        });
                        html += '</td>';
                    } else {
                        html += '<td class="day-cell empty"></td>';
                    }
                }
                html += '</tr>';
            }
            
            html += '</tbody>';
            document.getElementById('weekTable').innerHTML = html;
        }

        function abrirDetalhesTurma(id, data) {
            turmaSelecionada = turmas.find(t => String(t.id) === String(id));
            if (!turmaSelecionada) { 
                alert('Turma não encontrada!'); 
                return; 
            }
            
            document.getElementById('modalTurmaNome').textContent = turmaSelecionada.nome;
            
            if (turmaSelecionada.data_avulsa) {
                document.getElementById('modalTurmaDia').textContent = new Date(turmaSelecionada.data_avulsa).toLocaleDateString('pt-BR');
                document.getElementById('modalTurmaTipo').textContent = 'Aula Avulsa';
            } else {
                const diaIndex = diasSemanaFull.indexOf(turmaSelecionada.dia_semana);
                document.getElementById('modalTurmaDia').textContent = diaIndex >= 0 ? diasSemana[diaIndex] : turmaSelecionada.dia_semana;
                document.getElementById('modalTurmaTipo').textContent = 'Turma Regular';
            }
            
            document.getElementById('modalTurmaHorario').textContent = turmaSelecionada.horario_inicio + ' às ' + turmaSelecionada.horario_fim;
            document.getElementById('modalTurmaProfessor').textContent = turmaSelecionada.perfis?.nome || 'Não definido';
            
            document.getElementById('listaAlunosContainer').innerHTML = '';
            document.getElementById('loadingAlunos').style.display = 'block';
            document.getElementById('semAlunos').style.display = 'none';
            
            document.getElementById('modalDetalhesAula').classList.remove('hidden');
            carregarAlunos();
        }

        function carregarAlunos() {
            const token = localStorage.getItem('token');
            
            fetch('/api/matriculas/' + turmaSelecionada.id, { 
                headers: { 'Authorization': 'Bearer ' + token } 
            })
            .then(res => res.json())
            .then(matriculas => {
                document.getElementById('loadingAlunos').style.display = 'none';
                
                if (!matriculas || matriculas.length === 0) {
                    document.getElementById('semAlunos').style.display = 'block';
                    document.getElementById('countAlunos').textContent = '0';
                    return;
                }
                
                const matriculasAtivas = matriculas.filter(m => m.ativa === true && m.alunos !== null);
                document.getElementById('countAlunos').textContent = matriculasAtivas.length;
                
                if (matriculasAtivas.length === 0) {
                    document.getElementById('semAlunos').style.display = 'block';
                    return;
                }
                
                renderizarAlunos(matriculasAtivas);
            })
            .catch(err => {
                document.getElementById('loadingAlunos').style.display = 'none';
                document.getElementById('semAlunos').style.display = 'block';
            });
        }

        function renderizarAlunos(matriculas) {
            let html = '';
            matriculas.forEach(m => {
                const aluno = m.alunos;
                html += '<div class="aluno-item">' +
                    '<div class="aluno-avatar"><i class="fas fa-user"></i></div>' +
                    '<div class="aluno-nome">' + (aluno ? aluno.nome : 'Desconhecido') + '</div>' +
                '</div>';
            });
            document.getElementById('listaAlunosContainer').innerHTML = html;
        }

        function fecharModal() { 
            document.getElementById('modalDetalhesAula').classList.add('hidden'); 
            turmaSelecionada = null;
        }
        
        function logout() {
            const token = localStorage.getItem('token');
            fetch('/api/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
            localStorage.removeItem('token');
            localStorage.removeItem('perfil');
            window.location.href = '/';
        }
        
        window.onclick = function(event) { 
            if (event.target.id === 'modalDetalhesAula') fecharModal(); 
        };
    </script>
</body>
</html>
