<!-- pages/confirmar.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Presenca - B&T Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #667eea; --primary-dark: #764ba2; --success: #10b981; --success-dark: #059669; --danger: #ef4444; --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-400: #9ca3af; --gray-500: #6b7280; --gray-900: #111827; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); min-height: 100vh; padding: 16px; }
        .container { background: white; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); max-width: 500px; margin: 0 auto; overflow: hidden; animation: slideUp 0.5s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 32px 24px; text-align: center; }
        .header h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .content { padding: 24px; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { text-align: center; padding: 40px 24px; }
        .error h2 { color: var(--gray-900); margin-bottom: 8px; }
        .error p { color: var(--gray-500); }
        .aluno-nome { font-size: 1.2rem; font-weight: 600; color: var(--gray-900); margin-bottom: 20px; text-align: center; }
        .aula-card { background: var(--gray-50); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--gray-200); }
        .aula-card h3 { font-size: 1rem; color: var(--gray-900); margin-bottom: 8px; }
        .aula-info { font-size: 0.9rem; color: var(--gray-500); margin-bottom: 4px; }
        .aula-info i { width: 20px; color: var(--gray-400); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
        .btn-confirmar { background: var(--success); color: white; }
        .btn-confirmar:hover { background: #059669; }
        .btn-cancelar { background: transparent; color: var(--danger); border: 2px solid var(--danger); }
        .btn-cancelar:hover { background: #fee2e2; }
        .success-message { text-align: center; padding: 40px 24px; }
        .success-message i { font-size: 4rem; color: var(--success); margin-bottom: 16px; }
        .success-message h2 { color: var(--gray-900); margin-bottom: 8px; }
        .success-message p { color: var(--gray-500); }
        .empty { text-align: center; padding: 40px 24px; color: var(--gray-500); }
        .empty i { font-size: 3rem; margin-bottom: 16px; opacity: 0.5; }
        .footer { text-align: center; padding: 16px; color: var(--gray-400); font-size: 0.8rem; background: var(--gray-50); border-top: 1px solid var(--gray-200); }
        @media (max-width: 480px) { body { padding: 0; } .container { border-radius: 0; min-height: 100vh; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Confirmar Presenca</h1>
            <p>B&amp;T Tech - Escola de Esportes</p>
        </div>
        <div class="content">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Carregando suas aulas...</p>
            </div>
            <div id="error" class="error" style="display:none;">
                <h2>Ops!</h2>
                <p id="error-msg">Algo deu errado.</p>
            </div>
            <div id="aulas" style="display:none;">
                <p class="aluno-nome" id="aluno-nome"></p>
                <div id="lista-aulas"></div>
            </div>
            <div id="success" class="success-message" style="display:none;">
                <i class="fas fa-check-circle"></i>
                <h2>Obrigado!</h2>
                <p id="success-msg">Sua resposta foi registrada.</p>
            </div>
        </div>
        <div class="footer">Powered by B&amp;T Tech</div>
    </div>

    <script>
        // Pegar ID do aluno da URL
        var urlParams = new URLSearchParams(window.location.search);
        var alunoId = urlParams.get('aluno');
        
        console.log("Aluno ID:", alunoId);
        
        // Funcao para carregar as aulas
        function carregarAulas() {
            if (!alunoId) {
                showError("Link invalido. ID do aluno nao encontrado.");
                return;
            }
            
            fetch("/api/aulas-aluno?aluno=" + alunoId)
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    console.log("Dados recebidos:", data);
                    
                    if (!data.success) {
                        showError(data.error || "Erro ao carregar aulas.");
                        return;
                    }
                    
                    document.getElementById("aluno-nome").textContent = data.dados.aluno_nome;
                    
                    if (data.dados.aulas.length === 0) {
                        document.getElementById("loading").style.display = "none";
                        document.getElementById("aulas").style.display = "block";
                        document.getElementById("lista-aulas").innerHTML = '<div class="empty"><i class="fas fa-calendar-check"></i><p>Nenhuma aula pendente de confirmacao!</p></div>';
                        return;
                    }
                    
                    var html = "";
                    for (var i = 0; i < data.dados.aulas.length; i++) {
                        var aula = data.dados.aulas[i];
                        html += '<div class="aula-card">';
                        html += '<h3>' + escapeHtml(aula.turma_nome) + '</h3>';
                        html += '<p class="aula-info"><i class="fas fa-calendar"></i> ' + escapeHtml(aula.data) + '</p>';
                        html += '<p class="aula-info"><i class="fas fa-clock"></i> ' + escapeHtml(aula.horario_inicio) + ' as ' + escapeHtml(aula.horario_fim) + '</p>';
                        html += '<button class="btn btn-confirmar" data-id="' + aula.presenca_id + '" data-status="confirmado">';
                        html += '<i class="fas fa-check"></i> Confirmar Presenca';
                        html += '</button>';
                        html += '<button class="btn btn-cancelar" data-id="' + aula.presenca_id + '" data-status="cancelado">';
                        html += '<i class="fas fa-times"></i> Cancelar Aula';
                        html += '</button>';
                        html += '</div>';
                    }
                    
                    document.getElementById("lista-aulas").innerHTML = html;
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("aulas").style.display = "block";
                    
                    // Adicionar event listeners aos botoes
                    var botoes = document.querySelectorAll('.btn');
                    for (var j = 0; j < botoes.length; j++) {
                        botoes[j].addEventListener('click', function(e) {
                            var btn = e.currentTarget;
                            var id = btn.getAttribute('data-id');
                            var status = btn.getAttribute('data-status');
                            confirmar(id, status);
                        });
                    }
                })
                .catch(function(e) {
                    console.error("Erro:", e);
                    showError("Erro de conexao. Tente novamente.");
                });
        }
        
        // Funcao para escapar HTML e evitar XSS
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        
        // Funcao para confirmar presenca
        function confirmar(presencaId, status) {
            console.log("Confirmando - ID:", presencaId, "Status:", status);
            
            fetch("/api/confirmar-presenca", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ presenca_id: presencaId, status: status })
            })
            .then(function(response) { return response.json(); })
            .then(function(result) {
                console.log("Resultado:", result);
                if (result.success) {
                    if (status === "confirmado") {
                        showSuccess("Presenca confirmada com sucesso!");
                    } else {
                        showSuccess("Aula cancelada. Sentiremos sua falta!");
                    }
                    // Recarrega apos 2 segundos
                    setTimeout(carregarAulas, 2000);
                } else {
                    alert("Erro: " + (result.error || "Erro desconhecido"));
                }
            })
            .catch(function(e) {
                console.error("Erro ao confirmar:", e);
                alert("Erro ao confirmar. Verifique sua conexao.");
            });
        }
        
        // Funcao para mostrar sucesso
        function showSuccess(msg) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("aulas").style.display = "none";
            document.getElementById("success").style.display = "block";
            document.getElementById("success-msg").textContent = msg;
        }
        
        // Funcao para mostrar erro
        function showError(msg) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("error").style.display = "block";
            document.getElementById("error-msg").textContent = msg;
        }
        
        // Iniciar
        carregarAulas();
    </script>
</body>
</html>
