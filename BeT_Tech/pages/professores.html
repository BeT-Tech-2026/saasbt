<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Professores - B&T Tech</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-volleyball-ball"></i></div>
            <span>B&T Tech</span>
        </div>
        <nav class="sidebar-menu">
            <a href="/dashboard" class="menu-item"><i class="fas fa-home"></i> Início</a>
            <a href="/alunos" class="menu-item"><i class="fas fa-users"></i> Alunos</a>
            <a href="/professores" class="menu-item active"><i class="fas fa-chalkboard-teacher"></i> Professores</a>
            <a href="/turmas" class="menu-item"><i class="fas fa-school"></i> Turmas</a>
            <a href="/semanal" class="menu-item"><i class="fas fa-calendar-week"></i> Grade Semanal</a>
            <a href="/painel" class="menu-item"><i class="fas fa-clipboard-list"></i> Painel do Dia</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-details">
                    <p class="user-name" id="userName">Carregando...</p>
                    <p class="user-type" id="userType">Carregando...</p>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-header">
            <h1><i class="fas fa-chalkboard-teacher mr-2"></i>Professores</h1>
        </header>

        <div class="content">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-list mr-2"></i>Lista de Professores</h2>
                    <button onclick="openModal()" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Novo Professor
                    </button>
                </div>
                <div class="card-body">
                    <div id="professoresList" class="grid-cards"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Novo Professor</h3>
                <button onclick="closeModal()" class="close">&times;</button>
            </div>
            <form id="professorForm" class="modal-body">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nome *</label>
                    <input type="text" id="profNome" placeholder="Nome completo" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> E-mail *</label>
                    <input type="email" id="profEmail" placeholder="email@exemplo.com" required>
                </div>
                    <div class="form-group">
                        <label>Senha *</label>
                        <input type="password" id="profSenha" required minlength="6">
                    </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Cadastrar</button>
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let perfil = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) { 
                window.location.href = '/'; 
                return; 
            }

            perfil = JSON.parse(localStorage.getItem('perfil')) || await getPerfil(token);
            
            if (!perfil || perfil.tipo !== 'dono') {
                window.location.href = '/dashboard';
                return;
            }

            document.getElementById('userName').textContent = perfil.nome;
            document.getElementById('userType').textContent = 'Administrador';

            loadProfessores();
        });

        async function getPerfil(token) {
            const response = await fetch('/api/session', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await response.json();
            return data.perfil;
        }

        async function loadProfessores() {
            const token = localStorage.getItem('token');
            const response = await fetch('/api/professores', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const professores = await response.json();

            const container = document.getElementById('professoresList');
            if (professores && professores.length > 0) {
                container.innerHTML = professores.map(p => `
                    <div class="profile-card">
                        <div class="profile-avatar"><i class="fas fa-user"></i></div>
                        <h3>${p.nome}</h3>
                        <p>${p.email}</p>
                        <button onclick="desativarProfessor('${p.id}')" class="btn btn-danger btn-sm">Desativar</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="empty">Nenhum professor cadastrado</p>';
            }
        }

        window.openModal = () => document.getElementById('modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        document.getElementById('professorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            
            const nome = document.getElementById('profNome').value;
            const email = document.getElementById('profEmail').value;
            const senha = document.getElementById('profSenha').value;

            const response = await fetch('/api/professores', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ nome, email, senha })
            });

            if (response.ok) {
                alert('Professor cadastrado com sucesso!\n\nEmail: ' + email + '\nSenha: ' + senha);
                closeModal();
                document.getElementById('professorForm').reset();
                loadProfessores();
            } else {
                const data = await response.json();
                alert('Erro: ' + data.error);
            }
        });

        window.desativarProfessor = async (id) => {
            if (!confirm('Desativar professor?')) return;
            const token = localStorage.getItem('token');
            await fetch('/api/professores/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            loadProfessores();
        };

        async function logout() {
            const token = localStorage.getItem('token');
            await fetch('/api/logout', { 
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            localStorage.removeItem('token');
            localStorage.removeItem('perfil');
            window.location.href = '/';
        }
    </script>
</body>
</html>
