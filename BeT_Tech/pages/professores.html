<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professores - B&T Tech</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== ESTILOS ESPECÍFICOS ========== */
        
        .profile-card {
            position: relative;
        }

        .profile-card .color-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid var(--bg-card);
        }

        .profile-card-header {
            padding: 20px;
            text-align: center;
        }

        .profile-card .profile-avatar {
            width: 56px;
            height: 56px;
            margin: 0 auto 10px;
        }

        .profile-card h3 {
            font-size: 15px;
            margin-bottom: 2px;
        }

        .profile-card p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .profile-card-body {
            padding: 16px 20px;
        }

        .profile-stats {
            display: flex;
            gap: 12px;
        }

        .profile-stat {
            flex: 1;
            background: var(--bg-dark);
            padding: 10px;
            border-radius: var(--radius-sm);
            text-align: center;
        }

        .profile-stat .value {
            font-size: 16px;
            font-weight: 700;
        }

        .profile-stat .label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .profile-card-actions {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .profile-card-actions .btn {
            flex: 1;
            font-size: 12px;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .color-input {
            width: 44px;
            height: 36px;
            border: none;
            cursor: pointer;
            background: none;
        }

        .color-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-input::-webkit-color-swatch { 
            border: 2px solid var(--border); 
            border-radius: 6px; 
        }

        .color-preview {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--border);
        }

        /* Grid */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
    </style>
</head>
<body class="dashboard-body">

    <!-- Menu Hamburger Mobile -->
    <button class="menu-toggle" type="button" onclick="toggleSidebar()" aria-label="Abrir menu" aria-expanded="false">
        <i class="fas fa-bars"></i>
    </button>
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-racquet"></i></div>
            <span>B&T Tech</span>
        </div>
        <nav class="sidebar-menu">
            <a href="/dashboard" class="menu-item"><i class="fas fa-home"></i> Início</a>
            <a href="/alunos" class="menu-item"><i class="fas fa-users"></i> Alunos</a>
            <a href="/professores" class="menu-item active"><i class="fas fa-chalkboard-teacher"></i> Professores</a>
            <a href="/turmas" class="menu-item"><i class="fas fa-school"></i> Turmas</a>
            <a href="/semanal" class="menu-item"><i class="fas fa-calendar-week"></i> Grade Semanal</a>
            <a href="/confirmacoes" class="menu-item"><i class="fab fa-whatsapp"></i> Confirmações</a>
            <a href="/relatorios" class="menu-item"><i class="fas fa-chart-bar"></i> Relatórios</a>
            <a href="/financeiro" class="menu-item"><i class="fas fa-dollar-sign"></i> Financeiro</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-details">
                    <p class="user-name" id="userName">Carregando...</p>
                    <p class="user-type" id="userType">Carregando...</p>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn" aria-label="Sair">
                <i class="fas fa-sign-out-alt"></i> Sair
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1><i class="fas fa-chalkboard-teacher mr-2"></i>Professores</h1>
            <button onclick="openModal()" class="btn btn-primary">
                <i class="fas fa-plus"></i> Novo
            </button>
        </header>

        <div class="content">
            <!-- Loading Skeleton -->
            <div id="loadingSkeleton" class="grid-cards" style="display: none;">
                <div class="skeleton-card" style="padding: 20px;">
                    <div class="skeleton" style="width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 10px;"></div>
                    <div class="skeleton" style="width: 100px; height: 14px; margin: 0 auto 8px;"></div>
                    <div class="skeleton" style="width: 80px; height: 10px; margin: 0 auto;"></div>
                </div>
                <div class="skeleton-card" style="padding: 20px;">
                    <div class="skeleton" style="width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 10px;"></div>
                    <div class="skeleton" style="width: 100px; height: 14px; margin: 0 auto 8px;"></div>
                    <div class="skeleton" style="width: 80px; height: 10px; margin: 0 auto;"></div>
                </div>
            </div>

            <!-- Lista de Professores -->
            <div id="professoresList" class="grid-cards" role="list">
                <!-- Renderizado via JS -->
            </div>
        </div>
    </main>


    <!-- Modal Professor -->
    <div id="modalProfessor" class="modal hidden" role="dialog" aria-labelledby="modalProfessorTitulo" aria-modal="true">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalProfessorTitulo"><i class="fas fa-user mr-2"></i>Novo Professor</h3>
                <button onclick="closeModal()" class="close" aria-label="Fechar">&times;</button>
            </div>
            <form id="professorForm" class="modal-body">
                <input type="hidden" id="profId">
                
                <div class="form-group">
                    <label for="profNome">Nome *</label>
                    <input type="text" id="profNome" placeholder="Nome completo" required>
                </div>

                <div class="form-group">
                    <label for="profEmail">E-mail *</label>
                    <input type="email" id="profEmail" placeholder="email@exemplo.com" required>
                </div>
                <div class="form-group">
                    <label for="profSenha">Senha *</label>
                    <input type="password" id="profSenha" required minlength="6" placeholder="Mínimo 6 caracteres">
                </div>

                <div class="form-group">
                    <label for="profCor">Cor</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="profCor" value="#3b82f6" class="color-input">
                        <span id="colorPreview" class="color-preview" style="background: #3b82f6;"></span>
                        <small style="color: var(--text-muted);">Identificação na grade</small>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary" id="btnSalvarProfessor">
                        <i class="fas fa-check"></i> Salvar
                    </button>
                    <button type="button" onclick="closeModal()" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Confirmação -->
    <div id="modalConfirm" class="modal hidden" role="alertdialog" aria-modal="true">
        <div class="modal-content" style="max-width: 380px;">
            <div class="modal-header">
                <h3><i class="fas fa-exclamation-triangle" style="color: var(--warning);"></i> Desativar</h3>
                <button onclick="fecharConfirm()" class="close">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center;">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="btnConfirmarAcao">
                    <i class="fas fa-check"></i> Sim
                </button>
                <button onclick="fecharConfirm()" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Não
                </button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script>
        let perfil = null;
        let professoresData = [];

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${icons[type]}"></i><span>${message}</span><button onclick="this.parentElement.remove()" style="background:none;border:none;color:inherit;margin-left:auto;cursor:pointer"><i class="fas fa-times"></i></button>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/'; return; }

            perfil = JSON.parse(localStorage.getItem('perfil')) || await getPerfil(token);
            if (!perfil || perfil.tipo !== 'dono') {
                showToast('Acesso restrito', 'warning');
                setTimeout(() => window.location.href = '/dashboard', 1500);
                return;
            }

            document.getElementById('userName').textContent = perfil.nome;
            document.getElementById('userType').textContent = 'Administrador';

            document.getElementById('profCor').addEventListener('input', (e) => {
                document.getElementById('colorPreview').style.background = e.target.value;
            });

            document.getElementById('loadingSkeleton').style.display = 'grid';
            await loadProfessores();
        });

        async function getPerfil(token) {
            try {
                const response = await fetch('/api/session', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await response.json();
                return data.perfil;
            } catch (e) { return null; }
        }

        async function loadProfessores() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('/api/professores', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!response.ok) throw new Error('Erro');
                professoresData = await response.json();

                document.getElementById('loadingSkeleton').style.display = 'none';
                renderProfessores();
            } catch (error) {
                showToast('Erro ao carregar', 'error');
                document.getElementById('loadingSkeleton').style.display = 'none';
                document.getElementById('professoresList').innerHTML = `<div class="empty" style="grid-column:1/-1"><i class="fas fa-exclamation-triangle"></i><br>Erro ao carregar<br><button onclick="loadProfessores()" class="btn btn-secondary btn-sm" style="margin-top:10px"><i class="fas fa-redo"></i> Tentar</button></div>`;
            }
        }

        function renderProfessores() {
            const container = document.getElementById('professoresList');

            if (!professoresData || professoresData.length === 0) {
                container.innerHTML = `<div class="empty" style="grid-column:1/-1"><i class="fas fa-chalkboard-teacher" style="font-size:32px;opacity:0.3"></i><br>Nenhum professor cadastrado<br><button onclick="openModal()" class="btn btn-primary" style="margin-top:12px"><i class="fas fa-plus"></i> Cadastrar</button></div>`;
                return;
            }

            container.innerHTML = professoresData.map(p => {
                const cor = p.cor || '#3b82f6';
                const inicial = p.nome ? p.nome.charAt(0).toUpperCase() : '?';
                return `
                <div class="profile-card">
                    <div class="color-indicator" style="background:${cor}"></div>
                    <div class="profile-card-header">
                        <div class="profile-avatar" style="background:${cor}">${inicial}</div>
                        <h3>${escapeHtml(p.nome)}</h3>
                        <p>${escapeHtml(p.email)}</p>
                    </div>
                    <div class="profile-card-body">
                        <div class="profile-stats">
                            <div class="profile-stat">
                                <div class="value" style="text-transform:uppercase;font-size:12px">${cor}</div>
                                <div class="label">Cor</div>
                            </div>
                            <div class="profile-stat">
                                <div class="value" style="color:${p.ativo !== false ? 'var(--success)' : 'var(--text-muted)'}">${p.ativo !== false ? 'Ativo' : 'Inativo'}</div>
                                <div class="label">Status</div>
                            </div>
                        </div>
                    </div>
                    <div class="profile-card-actions">
                        <button onclick="editarProfessor('${p.id}')" class="btn btn-secondary">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button onclick="confirmarDesativar('${p.id}', '${escapeHtml(p.nome)}')" class="btn btn-danger">
                            <i class="fas fa-ban"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function openModal() {
            document.getElementById('modalProfessor').classList.remove('hidden');
            document.getElementById('professorForm').reset();
            document.getElementById('professorForm').removeAttribute('data-edit-id');
            document.getElementById('profSenha').setAttribute('required', 'true');
            document.getElementById('profCor').value = '#3b82f6';
            document.getElementById('colorPreview').style.background = '#3b82f6';
            document.getElementById('modalProfessorTitulo').innerHTML = '<i class="fas fa-user mr-2"></i>Novo Professor';
            document.getElementById('profNome').focus();
        }

        function closeModal() {
            document.getElementById('modalProfessor').classList.add('hidden');
        }

        window.editarProfessor = function(id) {
            const professor = professoresData.find(p => p.id === id);
            if (!professor) { showToast('Professor não encontrado', 'error'); return; }

            document.getElementById('profNome').value = professor.nome || '';
            document.getElementById('profEmail').value = professor.email || '';
            document.getElementById('profSenha').value = '';
            document.getElementById('profSenha').removeAttribute('required');
            document.getElementById('profCor').value = professor.cor || '#3b82f6';
            document.getElementById('colorPreview').style.background = professor.cor || '#3b82f6';

            document.getElementById('professorForm').setAttribute('data-edit-id', id);
            document.getElementById('modalProfessorTitulo').innerHTML = '<i class="fas fa-edit mr-2"></i>Editar Professor';
            document.getElementById('modalProfessor').classList.remove('hidden');
            document.getElementById('profNome').focus();

        };

        document.getElementById('professorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const btn = document.getElementById('btnSalvarProfessor');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const nome = document.getElementById('profNome').value.trim();
            const email = document.getElementById('profEmail').value.trim();
            const senha = document.getElementById('profSenha').value;
            const cor = document.getElementById('profCor').value;
            const editId = document.getElementById('professorForm').getAttribute('data-edit-id');

            if (!nome || !email) { showToast('Preencha os campos obrigatórios', 'warning'); btn.disabled = false; btn.innerHTML = originalText; return; }

            const body = { nome, email, cor };
            if (senha) body.senha = senha;

            try {
                const url = editId ? `/api/professores/${editId}` : '/api/professores';
                const method = editId ? 'PUT' : 'POST';
                const response = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(body) });

                if (response.ok) {
                    const data = await response.json();
                    showToast(editId ? 'Atualizado!' : 'Cadastrado!', 'success');
                    closeModal();
                    if (!editId && data.email && senha) {
                        setTimeout(() => alert(`Professor cadastrado!\n\nEmail: ${data.email}\nSenha: ${senha}`), 300);
                    }
                    await loadProfessores();
                } else {
                    const err = await response.json();
                    showToast(err.error || 'Erro', 'error');
                }
            } catch (error) { showToast('Erro de conexão', 'error'); }
            finally { btn.disabled = false; btn.innerHTML = originalText; }
        });

        let confirmCallback = null;

        window.confirmarDesativar = function(id, nome) {
            document.getElementById('confirmMessage').innerHTML = `Desativar <strong>${escapeHtml(nome)}</strong>?`;
            confirmCallback = async () => { await desativarProfessor(id); };
            document.getElementById('modalConfirm').classList.remove('hidden');
            document.getElementById('btnConfirmarAcao').onclick = () => { fecharConfirm(); if (confirmCallback) confirmCallback(); };
        };

        function fecharConfirm() {
            document.getElementById('modalConfirm').classList.add('hidden');
            confirmCallback = null;
        }

        async function desativarProfessor(id) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/professores/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                if (response.ok) { showToast('Desativado!', 'success'); await loadProfessores(); }
                else { const err = await response.json(); showToast(err.error || 'Erro', 'error'); }
            } catch (error) { showToast('Erro de conexão', 'error'); }
        }

        async function logout() {
            const token = localStorage.getItem('token');
            try { await fetch('/api/logout', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); } catch (e) {}
            localStorage.removeItem('token');
            localStorage.removeItem('perfil');
            window.location.href = '/';
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); fecharConfirm(); } });
        document.addEventListener('click', (e) => { if (e.target.classList.contains('modal')) e.target.classList.add('hidden'); });
    </script>
<!-- PATCH MOBILE GLOBAL SCRIPT -->

<script>
(function () {
    window.toggleSidebar = function () {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        if (!sidebar) return;

        const willOpen = !sidebar.classList.contains('show');
        sidebar.classList.toggle('show', willOpen);
        if (overlay) overlay.classList.toggle('show', willOpen);
        document.body.classList.toggle('menu-open', willOpen);
    };

    document.addEventListener('DOMContentLoaded', function () {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        const menuToggle = document.querySelector('.menu-toggle');

        if (overlay) {
            overlay.addEventListener('click', function () {
                if (sidebar) sidebar.classList.remove('show');
                overlay.classList.remove('show');
                document.body.classList.remove('menu-open');
            });
        }

        if (menuToggle) {
            menuToggle.setAttribute('type', 'button');
            menuToggle.setAttribute('aria-expanded', 'false');
            menuToggle.addEventListener('click', function () {
                const isOpen = sidebar && sidebar.classList.contains('show');
                menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            });
        }

        document.querySelectorAll('.sidebar .menu-item').forEach(function (link) {
            link.addEventListener('click', function () {
                if (window.innerWidth <= 768) {
                    if (sidebar) sidebar.classList.remove('show');
                    if (overlay) overlay.classList.remove('show');
                    document.body.classList.remove('menu-open');
                }
            });
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                if (sidebar) sidebar.classList.remove('show');
                if (overlay) overlay.classList.remove('show');
                document.body.classList.remove('menu-open');
            }
        });
    });
})();
</script>

</body>
</html>
