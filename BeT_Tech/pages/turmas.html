<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Turmas - B&T Tech</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-volleyball-ball"></i></div>
            <span>B&T Tech</span>
        </div>
        <nav class="sidebar-menu">
            <a href="/dashboard" class="menu-item"><i class="fas fa-home"></i> Início</a>
            <a href="/alunos" class="menu-item"><i class="fas fa-users"></i> Alunos</a>
            <a href="/professores" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> Professores</a>
            <a href="/turmas" class="menu-item active"><i class="fas fa-school"></i> Turmas</a>
            <a href="/semanal" class="menu-item"><i class="fas fa-calendar-week"></i> Grade Semanal</a>
            <a href="/painel" class="menu-item"><i class="fas fa-clipboard-list"></i> Painel do Dia</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar"><i class="fas fa-user"></i></div>
                <div class="user-details">
                    <p class="user-name" id="userName">Carregando...</p>
                    <p class="user-type" id="userType">Carregando...</p>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1><i class="fas fa-school mr-2"></i>Turmas</h1>
        </header>

        <div class="content">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-list mr-2"></i>Lista de Turmas</h2>
                    <button id="btnNovaTurma" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Nova Turma
                    </button>
                </div>
                <div class="card-body">
                    <div id="turmasList" class="grid-cards"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Nova/Editar Turma -->
    <div id="modalTurma" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Nova Turma</h3>
                <button onclick="fecharModalTurma()" class="close">&times;</button>
            </div>
            <form id="turmaForm" class="modal-body">
                <div class="form-group">
                    <label>Nome da Turma *</label>
                    <input type="text" id="turmaNome" required placeholder="Ex: Avançado A">
                </div>
                
                <!-- Aula Avulsa -->
                <div class="form-group" style="border: 1px solid var(--border); padding: 12px; border-radius: var(--radius-md);">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" id="turmaAvulsa" style="margin-right: 10px; width: 18px; height: 18px;" onchange="toggleDataAvulsa()">
                        <span style="font-weight: 600; color: var(--text-primary);">Aula Avulsa (evento único)</span>
                    </label>
                </div>

                <!-- Data da Aula Avulsa -->
                <div class="form-group" id="grupoDataAvulsa" style="display: none;">
                    <label>Data da Aula *</label>
                    <input type="date" id="turmaDataAvulsa">
                </div>

                <!-- Dias da Semana -->
                <div class="form-group" id="grupoDiasSemana">
                    <label>Dia(s) da Semana *</label>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; background: var(--bg-dark); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
                            <input type="checkbox" class="dia-checkbox" value="segunda"> Seg
                        </label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; background: var(--bg-dark); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
                            <input type="checkbox" class="dia-checkbox" value="terca"> Ter
                        </label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; background: var(--bg-dark); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
                            <input type="checkbox" class="dia-checkbox" value="quarta"> Qua
                        </label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; background: var(--bg-dark); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
                            <input type="checkbox" class="dia-checkbox" value="quinta"> Qui
                        </label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; background: var(--bg-dark); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
                            <input type="checkbox" class="dia-checkbox" value="sexta"> Sex
                        </label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; background: var(--bg-dark); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
                            <input type="checkbox" class="dia-checkbox" value="sabado"> Sáb
                        </label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; background: var(--bg-dark); padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
                            <input type="checkbox" class="dia-checkbox" value="domingo"> Dom
                        </label>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Início *</label>
                        <input type="time" id="turmaInicio" required>
                    </div>
                    <div class="form-group">
                        <label>Fim *</label>
                        <input type="time" id="turmaFim" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Professor</label>
                    <select id="turmaProfessor">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Limite de Alunos</label>
                    <input type="number" id="turmaLimite" value="4" min="1" max="20">
                </div>

                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <button type="button" onclick="fecharModalTurma()" class="btn btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Matricular -->
    <div id="modalMatricular" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Matricular Aluno</h3>
                <button onclick="fecharModalMatricular()" class="close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Selecione os alunos:</p>
                <div id="alunosCheckboxes" style="margin-top: 16px; max-height: 300px; overflow-y: auto;"></div>
                <div class="modal-footer" style="margin-top: 20px;">
                    <button onclick="salvarMatriculas()" class="btn btn-primary">Salvar</button>
                    <button onclick="fecharModalMatricular()" class="btn btn-secondary">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let perfil = null;
        let turmasData = [];
        let turmaSelecionada = null;
        let turmaEmEdicao = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (!token) { 
                window.location.href = '/'; 
                return; 
            }

            perfil = JSON.parse(localStorage.getItem('perfil'));
            
            if (!perfil) {
                const response = await fetch('/api/session', { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                const data = await response.json();
                perfil = data.perfil;
                localStorage.setItem('perfil', JSON.stringify(perfil));
            }

            if (!perfil) { 
                window.location.href = '/'; 
                return; 
            }

            document.getElementById('userName').textContent = perfil.nome;
            document.getElementById('userType').textContent = perfil.tipo === 'dono' ? 'Administrador' : 'Professor';

            if (perfil.tipo !== 'dono') {
                document.querySelector('a[href="/professores"]').style.display = 'none';
            }

            document.getElementById('btnNovaTurma').addEventListener('click', abrirModalTurma);
            
            await loadTurmas();
            await loadProfessoresSelect();
        });

        async function loadTurmas() {
            const token = localStorage.getItem('token');
            const response = await fetch('/api/turmas', { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            turmasData = await response.json();

            for (let turma of turmasData) {
                const res = await fetch(`/api/matriculas/${turma.id}`, { 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                turma.alunosMatriculados = await res.json();
            }

            renderTurmas();
        }

        function renderTurmas() {
            const container = document.getElementById('turmasList');
            if (turmasData && turmasData.length > 0) {
                container.innerHTML = turmasData.map(t => `
                    <div class="turma-card">
                        <div class="turma-header">
                            <h3>${t.nome}</h3>
                            <span class="badge">${t.data_avulsa ? 'Avulsa' : t.dia_semana}</span>
                        </div>
                        <div class="turma-body">
                            <p><i class="fas fa-clock"></i> ${t.horario_inicio} - ${t.horario_fim}</p>
                            <p><i class="fas fa-user"></i> ${t.perfis?.nome || 'Sem professor'}</p>
                            ${t.data_avulsa ? `<p><i class="fas fa-calendar"></i> ${new Date(t.data_avulsa).toLocaleDateString('pt-BR')}</p>` : ''}
                            <p><i class="fas fa-users"></i> ${t.alunosMatriculados?.length || 0}/${t.limite_alunos} alunos</p>
                            
                            <div style="margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;">
                                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">ALUNOS:</p>
                                <div style="display: flex; flex-wrap: wrap; gap: 4px;">
                                    ${t.alunosMatriculados?.map(m => `
                                        <span class="aluno-tag">
                                            ${m.alunos?.nome}
                                            <button onclick="desmatricular('${m.id}')" title="Remover">&times;</button>
                                        </span>
                                    `).join('') || '<span style="font-size: 12px; color: var(--text-muted);">Nenhum</span>'}
                                </div>
                            </div>
                        </div>
                        <div class="turma-actions">
                            <button onclick="matricularAlunos('${t.id}')" class="btn btn-sm btn-primary" style="flex: 1;">
                                <i class="fas fa-user-plus"></i> Matricular
                            </button>
                            <button onclick="editarTurma('${t.id}')" class="btn btn-sm btn-secondary">
                                <i class="fas fa-edit"></i> Editar
                            </button>
                            <button onclick="excluirTurma('${t.id}')" class="btn btn-sm btn-danger">Excluir</button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<p class="empty">Nenhuma turma cadastrada</p>';
            }
        }

        async function loadProfessoresSelect() {
            const token = localStorage.getItem('token');
            const response = await fetch('/api/professores', { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            const professores = await response.json();
            const select = document.getElementById('turmaProfessor');
            if (professores) {
                select.innerHTML = '<option value="">Selecione...</option>' + 
                    professores.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            }
        }

        function toggleDataAvulsa() {
            const avulsa = document.getElementById('turmaAvulsa').checked;
            document.getElementById('grupoDataAvulsa').style.display = avulsa ? 'block' : 'none';
            document.getElementById('grupoDiasSemana').style.display = avulsa ? 'none' : 'block';
            
            // Ajustar required
            document.getElementById('turmaDataAvulsa').required = avulsa;
        }

        function abrirModalTurma() {
            turmaEmEdicao = null;
            document.getElementById('turmaForm').reset();
            
            // Reset checkboxes
            document.querySelectorAll('.dia-checkbox').forEach(cb => cb.checked = false);
            
            // Reset campos
            document.getElementById('turmaAvulsa').checked = false;
            document.getElementById('grupoDataAvulsa').style.display = 'none';
            document.getElementById('grupoDiasSemana').style.display = 'block';
            
            document.querySelector('#modalTurma .modal-header h3').textContent = 'Nova Turma';
            document.getElementById('modalTurma').classList.remove('hidden');
        }

        function fecharModalTurma() {
            document.getElementById('modalTurma').classList.add('hidden');
        }

        function abrirModalMatricular() {
            document.getElementById('modalMatricular').classList.remove('hidden');
        }

        function fecharModalMatricular() {
            document.getElementById('modalMatricular').classList.add('hidden');
        }

        window.editarTurma = async (id) => {
            const turma = turmasData.find(t => t.id === id);
            if (!turma) return;

            turmaEmEdicao = id;
            
            document.getElementById('turmaNome').value = turma.nome;
            document.getElementById('turmaInicio').value = turma.horario_inicio;
            document.getElementById('turmaFim').value = turma.horario_fim;
            document.getElementById('turmaProfessor').value = turma.professor_id || '';
            document.getElementById('turmaLimite').value = turma.limite_alunos;

            // Verifica se é avulsa
            if (turma.data_avulsa) {
                document.getElementById('turmaAvulsa').checked = true;
                document.getElementById('turmaDataAvulsa').value = turma.data_avulsa;
                toggleDataAvulsa();
            } else {
                document.getElementById('turmaAvulsa').checked = false;
                document.querySelectorAll('.dia-checkbox').forEach(cb => {
                    cb.checked = cb.value === turma.dia_semana;
                });
                toggleDataAvulsa();
            }

            document.querySelector('#modalTurma .modal-header h3').textContent = 'Editar Turma';
            document.getElementById('modalTurma').classList.remove('hidden');
        };

        document.getElementById('turmaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');

            const avulsa = document.getElementById('turmaAvulsa').checked;
            const nome = document.getElementById('turmaNome').value;
            const horario_inicio = document.getElementById('turmaInicio').value;
            const horario_fim = document.getElementById('turmaFim').value;
            const professor_id = document.getElementById('turmaProfessor').value || null;
            const limite_alunos = parseInt(document.getElementById('turmaLimite').value);

            let turmasToInsert = [];

            if (avulsa) {
                // Aula avulsa - uma data específica
                const data_avulsa = document.getElementById('turmaDataAvulsa').value;
                if (!data_avulsa) {
                    alert('Selecione a data da aula avulsa!');
                    return;
                }
                
                turmasToInsert.push({
                    escola_id: perfil.escola_id,
                    nome: nome,
                    dia_semana: null, // ou o dia da semana da data
                    horario_inicio,
                    horario_fim,
                    professor_id,
                    limite_alunos,
                    ativa: true,
                    data_avulsa: data_avulsa
                });
            } else {
                // Turma regular - pode ter múltiplos dias
                const diasSelecionados = Array.from(document.querySelectorAll('.dia-checkbox:checked')).map(cb => cb.value);
                
                if (diasSelecionados.length === 0) {
                    alert('Selecione pelo menos um dia da semana!');
                    return;
                }

                diasSelecionados.forEach(dia => {
                    turmasToInsert.push({
                        escola_id: perfil.escola_id,
                        nome: nome,
                        dia_semana: dia,
                        horario_inicio,
                        horario_fim,
                        professor_id,
                        limite_alunos,
                        ativa: true,
                        data_avulsa: null
                    });
                });
            }

            let url = '/api/turmas';
            let method = 'POST';

            if (turmaEmEdicao) {
                url = `/api/turmas/${turmaEmEdicao}`;
                method = 'PUT';
            }

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(avulsa ? turmasToInsert[0] : { turmas: turmasToInsert })
            });

            if (response.ok) {
                fecharModalTurma();
                document.getElementById('turmaForm').reset();
                await loadTurmas();
            } else {
                const err = await response.json();
                alert('Erro ao salvar: ' + err.error);
            }
        });

        window.matricularAlunos = async (turmaId) => {
            turmaSelecionada = turmasData.find(t => t.id === turmaId);
            const token = localStorage.getItem('token');
            
            const response = await fetch('/api/alunos', { 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            const alunos = await response.json();
            
            const matriculados = turmaSelecionada.alunosMatriculados?.map(m => m.aluno_id) || [];
            
            const container = document.getElementById('alunosCheckboxes');
            container.innerHTML = alunos.map(a => `
                <label style="display: flex; align-items: center; padding: 12px; background: ${matriculados.includes(a.id) ? 'var(--success-bg)' : 'var(--bg-dark)'}; border-radius: 8px; cursor: pointer; margin-bottom: 8px; border: 1px solid var(--border);">
                    <input type="checkbox" value="${a.id}" ${matriculados.includes(a.id) ? 'checked' : ''} style="margin-right: 12px;">
                    <span>${a.nome}</span>
                </label>
            `).join('') || '<p style="text-align: center; color: var(--text-muted);">Nenhum aluno</p>';
            
            abrirModalMatricular();
        };

        window.salvarMatriculas = async () => {
            const token = localStorage.getItem('token');
            const checkboxes = document.querySelectorAll('#alunosCheckboxes input:checked');
            const alunosSelecionados = Array.from(checkboxes).map(c => c.value);
            
            for (const alunoId of alunosSelecionados) {
                const jaMatriculado = turmaSelecionada.alunosMatriculados?.some(m => m.aluno_id === alunoId);
                if (!jaMatriculado) {
                    await fetch('/api/matriculas', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ turma_id: turmaSelecionada.id, aluno_id: alunoId })
                    });
                }
            }
            
            const alunosAtuaisIds = turmaSelecionada.alunosMatriculados?.map(m => m.aluno_id) || [];
            for (const alunoId of alunosAtuaisIds) {
                if (!alunosSelecionados.includes(alunoId)) {
                    const matricula = turmaSelecionada.alunosMatriculados.find(m => m.aluno_id === alunoId);
                    if (matricula) {
                        await fetch(`/api/matriculas/${matricula.id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                    }
                }
            }
            
            fecharModalMatricular();
            await loadTurmas();
            alert('Alunos matriculados!');
        };

        window.desmatricular = async (matriculaId) => {
            if (!confirm('Remover aluno?')) return;
            const token = localStorage.getItem('token');
            await fetch(`/api/matriculas/${matriculaId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            await loadTurmas();
        };

        window.excluirTurma = async (id) => {
            if (!confirm('Excluir turma?')) return;
            const token = localStorage.getItem('token');
            await fetch(`/api/turmas/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            await loadTurmas();
        };

        async function logout() {
            const token = localStorage.getItem('token');
            await fetch('/api/logout', { 
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            localStorage.removeItem('token');
            localStorage.removeItem('perfil');
            window.location.href = '/';
        }
    </script>
</body>
</html>
